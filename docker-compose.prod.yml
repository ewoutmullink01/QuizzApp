services:
  backend:
    build:
      context: ./backend
    container_name: quizzapp-backend
    restart: unless-stopped
    expose:
      - "8080"

  frontend:
    build:
      context: ./frontend
    container_name: quizzapp-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend